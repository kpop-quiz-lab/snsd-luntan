<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你是少女时代里的谁？</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #e8a0b0;
    --pink-light: #f7e0e7;
    --pink-dark: #c4607a;
    --cream: #fdf8f4;
    --text: #2a1a22;
    --text-muted: #7a5a65;
    --border: #e8d0d8;
    --white: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  #intro {
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 3rem 2rem;
    background: linear-gradient(160deg, #fdf0f4 0%, #fdf8f4 60%, #f0f4fd 100%);
  }

  .intro-kpop {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 2rem;
  }

  .intro-title {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 600;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 1rem;
  }

  .intro-title span { color: var(--pink-dark); }

  .intro-sub {
    font-size: 15px;
    color: var(--text-muted);
    line-height: 1.8;
    max-width: 380px;
    margin: 0 auto 2.5rem;
  }

  .intro-members {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    max-width: 420px;
    margin: 0 auto 2.5rem;
  }

  .member-pill {
    font-size: 12px;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text-muted);
    background: var(--white);
  }

  .btn-start {
    background: var(--pink-dark);
    color: white;
    border: none;
    padding: 16px 48px;
    border-radius: 40px;
    font-size: 16px;
    font-family: 'Noto Sans SC', sans-serif;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .btn-start:hover { background: #b04f68; transform: translateY(-1px); }

  .intro-note {
    margin-top: 1.5rem;
    font-size: 12px;
    color: var(--text-muted);
  }

  #quiz {
    padding: 2rem 1.5rem;
    max-width: 620px;
    margin: 0 auto;
    width: 100%;
    justify-content: flex-start;
  }

  .quiz-header { margin-bottom: 2rem; }

  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .progress-fill {
    height: 100%;
    background: var(--pink-dark);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .progress-text {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  .question-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    margin-bottom: 1.5rem;
  }

  .question-num {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--pink-dark);
    margin-bottom: 1rem;
    text-transform: uppercase;
  }

  .question-text {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(17px, 4vw, 20px);
    line-height: 1.6;
    color: var(--text);
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    font-size: 15px;
    line-height: 1.5;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    font-family: 'Noto Sans SC', sans-serif;
    transition: all 0.15s;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .option:hover { border-color: var(--pink); background: var(--pink-light); }
  .option.selected { border-color: var(--pink-dark); background: var(--pink-light); }

  .option-letter {
    width: 22px;
    height: 22px;
    min-width: 22px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .option.selected .option-letter {
    background: var(--pink-dark);
    border-color: var(--pink-dark);
    color: white;
  }

  .quiz-nav {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    margin-top: 1.5rem;
  }

  .btn-back {
    background: none;
    border: 1px solid var(--border);
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 14px;
    cursor: pointer;
    color: var(--text-muted);
    font-family: 'Noto Sans SC', sans-serif;
    transition: all 0.15s;
  }

  .btn-back:hover { background: var(--border); }
  .btn-back:disabled { opacity: 0.3; cursor: default; }

  .btn-next {
    background: var(--pink-dark);
    color: white;
    border: none;
    padding: 12px 32px;
    border-radius: 30px;
    font-size: 14px;
    cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif;
    transition: all 0.15s;
    opacity: 0.4;
    pointer-events: none;
  }

  .btn-next.ready { opacity: 1; pointer-events: auto; }
  .btn-next.ready:hover { background: #b04f68; }

  #loading {
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 3rem;
  }

  .loading-dots {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 1.5rem;
  }

  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--pink);
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  .loading-text { font-size: 14px; color: var(--text-muted); letter-spacing: 1px; }

  #result {
    padding: 2rem 1.5rem 4rem;
    max-width: 620px;
    margin: 0 auto;
    width: 100%;
  }

  .result-header {
    text-align: center;
    margin-bottom: 2rem;
    padding-top: 1rem;
  }

  .result-label {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 0.8rem;
  }

  .result-member {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(2.2rem, 8vw, 3.5rem);
    font-weight: 600;
    color: var(--pink-dark);
    line-height: 1.1;
    margin-bottom: 0.4rem;
  }

  .result-member-en {
    font-size: 14px;
    color: var(--text-muted);
    letter-spacing: 2px;
    margin-bottom: 1.5rem;
  }

  .result-tagline {
    font-size: 16px;
    line-height: 1.7;
    color: var(--text);
    max-width: 400px;
    margin: 0 auto;
    font-style: italic;
    font-family: 'Noto Serif SC', serif;
  }

  .result-divider { height: 1px; background: var(--border); margin: 2rem 0; }

  .section-title {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 1.2rem;
  }

  .bars-wrap {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem 1.5rem 1rem;
    margin-bottom: 1.5rem;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .bar-label { font-size: 13px; color: var(--text-muted); width: 60px; min-width: 60px; text-align: right; }

  .bar-track {
    flex: 1;
    height: 6px;
    background: var(--pink-light);
    border-radius: 3px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: var(--pink-dark);
    border-radius: 3px;
    width: 0;
    transition: width 0.8s ease;
  }

  .bar-val { font-size: 12px; color: var(--text-muted); width: 30px; text-align: right; }

  .review-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .review-text { font-size: 15px; line-height: 1.9; color: var(--text); }

  .similar-wrap { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1.5rem; }

  .similar-pill {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 18px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .share-btn {
    display: block;
    width: 100%;
    margin-top: 10px;
    background: var(--pink-dark);
    border: none;
    padding: 14px;
    border-radius: 30px;
    font-size: 14px;
    cursor: pointer;
    color: white;
    font-family: 'Noto Sans SC', sans-serif;
    transition: all 0.15s;
    letter-spacing: 1px;
  }

  .share-btn:hover { background: #b04f68; }

  .btn-retry {
    display: block;
    width: 100%;
    margin-top: 10px;
    background: none;
    border: 1px solid var(--border);
    padding: 14px;
    border-radius: 30px;
    font-size: 14px;
    cursor: pointer;
    color: var(--text-muted);
    font-family: 'Noto Sans SC', sans-serif;
    transition: all 0.15s;
    letter-spacing: 1px;
  }

  .btn-retry:hover { background: var(--pink-light); border-color: var(--pink); color: var(--text); }

  @media (max-width: 480px) {
    #quiz { padding: 1.5rem 1rem; }
    .question-card { padding: 1.5rem; }
    #result { padding: 1.5rem 1rem 3rem; }
  }
</style>
</head>
<body>

<div id="intro" class="screen active">
  <p class="intro-kpop">Girls' Generation · Personality Test</p>
  <h1 class="intro-title">你是少女时代<br>里的<span>哪一个？</span></h1>
  <p class="intro-sub">15道情境题，根据你在现实中的处事方式<br>匹配你最接近的少女时代成员气质</p>
  <div class="intro-members">
    <span class="member-pill">太妍</span>
    <span class="member-pill">Jessica</span>
    <span class="member-pill">顺圭</span>
    <span class="member-pill">Tiffany</span>
    <span class="member-pill">孝渊</span>
    <span class="member-pill">侑莉</span>
    <span class="member-pill">秀英</span>
    <span class="member-pill">允儿</span>
    <span class="member-pill">徐贤</span>
  </div>
  <button class="btn-start" onclick="startQuiz()">开始测试</button>
  <p class="intro-note">约 3～5 分钟完成</p>
</div>

<div id="quiz" class="screen">
  <div class="quiz-header">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <p class="progress-text" id="progressText">1 / 15</p>
  </div>
  <div class="question-card">
    <p class="question-num" id="qNum">Q 01</p>
    <p class="question-text" id="qText"></p>
  </div>
  <div class="options" id="optionsWrap"></div>
  <div class="quiz-nav">
    <button class="btn-back" id="btnBack" onclick="goBack()" disabled>← 上一题</button>
    <button class="btn-next" id="btnNext" onclick="goNext()">下一题 →</button>
  </div>
</div>

<div id="loading" class="screen">
  <div class="loading-dots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
  <p class="loading-text">分析你的气质中…</p>
</div>

<div id="result" class="screen">
  <div class="result-header">
    <p class="result-label">你最像</p>
    <h2 class="result-member" id="rName"></h2>
    <p class="result-member-en" id="rNameEn"></p>
    <p class="result-tagline" id="rTagline"></p>
  </div>
  <div class="result-divider"></div>
  <p class="section-title">你的五维光谱</p>
  <div class="bars-wrap" id="barsWrap"></div>
  <p class="section-title">锐评</p>
  <div class="review-card"><p class="review-text" id="rReview"></p></div>
  <p class="section-title">气质相近的成员</p>
  <div class="similar-wrap" id="rSimilar"></div>
  <button class="share-btn" id="shareBtn" onclick="copyResult()">复制分享文案</button>
  <button class="btn-retry" onclick="resetQuiz()">再测一次</button>
</div>

<script>
const QUESTIONS = [
  {
    text: "你在女团出道了，但有个队友天天划水，你是？",
    options: [
      { text: "大舞担实锤。一个人默默把走位补上，累死自己", s: [1,0,0,2,1] },
      { text: "直接在练习室发飙：『不想干就滚』", s: [1,0,2,3,2] },
      { text: "笑死，她划她的，我只要直拍出圈就行", s: [2,0,2,2,3] },
      { text: "关我什么事，我只是个镶边主唱", s: [0,0,0,0,2] }
    ]
  },
  {
    text: "某次打歌舞台，C位队友因为鞋跟太高差点摔倒，你离她最近：",
    options: [
      { text: "事后发疯：为什么公司给她穿这么高的鞋？！", s: [2,0,1,2,2] },
      { text: "下台后悄悄递给她创可贴，安慰她别哭", s: [1,2,1,1,1] },
      { text: "顺势扶了她一把，被全网通稿吹『神仙队友』", s: [0,2,0,0,1] },
      { text: "毫无反应，专注对着我的直拍镜头放电", s: [0,0,0,0,0] }
    ]
  },
  {
    text: "如果在踩组，你觉得你的粉圈画像大概是哪种？",
    options: [
      { text: "天天被狙『皇族』，但其实在公司吃力不讨好", s: [0,1,0,2,1] },
      { text: "佛系养老粉，正主不作妖，只求别被对家撕", s: [1,0,1,2,3] },
      { text: "腥风血雨体质，粉黑大战天天屠版", s: [2,0,0,1,4] },
      { text: "透明人，偶尔在盘点帖里被夸一句『可惜了』", s: [0,0,1,0,2] }
    ]
  },
  {
    text: "你的年末舞台被公司分到了最拉胯的衣服（烤地瓜受害者），你会？",
    options: [
      { text: "立刻罢录，让经纪人去和公司吵", s: [3,0,1,2,3] },
      { text: "没办法，只能靠脸和身材硬撑这套丑衣服了", s: [1,0,0,2,2] },
      { text: "跟关系好的队友翻白眼吐槽，但还是穿了", s: [0,2,1,1,1] },
      { text: "算了，可能这就是我的概念设定吧", s: [0,1,0,0,2] }
    ]
  },
  {
    text: "绿茶队友在泡泡上发了一条疑似内涵你的动态，你？",
    options: [
      { text: "直接发一条Ins Story硬刚回去", s: [2,1,1,1,2] },
      { text: "发一张全团合照，唯独把她P得很丑", s: [1,3,0,3,2] },
      { text: "截图发在私下小群里，跟姐妹痛骂她三百回合", s: [0,3,1,0,1] },
      { text: "懒得理，只要不影响我赚钱就行", s: [0,1,0,0,2] }
    ]
  },
  {
    text: "打歌期遇到你的暗恋对象（某大势男团成员），你会？",
    options: [
      { text: "安可舞台故意走错位，硬蹭过去搭话", s: [3,2,2,1,2] },
      { text: "眼神拉丝，但绝不主动，等他上钩", s: [2,2,2,2,2] },
      { text: "假装高冷，其实余光一直在看他", s: [0,2,1,0,2] },
      { text: "爱豆谈什么恋爱？搞事业啊喂！", s: [1,3,0,0,2] }
    ]
  },
  {
    text: "公司突然空降了一个什么都不会的『资源咖』到你们团，你会？",
    options: [
      { text: "毫不掩饰对她的嫌弃，排挤写在脸上", s: [3,1,2,1,3] },
      { text: "想发作，但为了团魂忍了", s: [0,3,1,0,1] },
      { text: "表面和气生财，私下离她八百米远", s: [1,2,1,1,2] },
      { text: "无所谓，反正大家各凭本事吃饭", s: [2,2,2,1,2] }
    ]
  },
  {
    text: "你辛辛苦苦准备的Solo曲被公司高层一秒毙掉，你的第一反应是？",
    options: [
      { text: "当场反驳：你懂什么叫概念吗老古董？", s: [2,1,0,1,4] },
      { text: "表面接受，回宿舍盖着被子偷偷哭", s: [0,3,0,1,2] },
      { text: "当场破防，需要队友连夜哄我", s: [0,3,1,0,1] },
      { text: "行吧，我再改一版商业口水歌给你们", s: [1,1,0,1,3] }
    ]
  },
  {
    text: "组合遭遇了毁灭性的『全网黑』，你会？",
    options: [
      { text: "无视恶评，该发自拍发自拍，我自美丽", s: [1,1,0,1,3] },
      { text: "严重内耗，每天开小号看豆瓣踩组怎么骂我", s: [0,4,0,1,2] },
      { text: "疯狂跟粉丝虐粉固粉：只要你们还在我就不怕", s: [0,4,1,0,1] },
      { text: "直接暂停活动，借口生病去休息", s: [0,2,1,0,1] }
    ]
  },
  {
    text: "同团的『大TOP』接到了你梦寐以求的高奢代言，你的真实感受是？",
    options: [
      { text: "可以啊！顺便让她给我带两个内部包包", s: [1,1,1,1,3] },
      { text: "替她开心，但马上逼经纪人给我接另一个竞品", s: [0,2,0,2,2] },
      { text: "有点酸，但我会用神级舞台扳回一城", s: [0,2,1,2,1] },
      { text: "毫无波澜，我本来也不喜欢跑时尚圈", s: [1,0,0,0,3] }
    ]
  },
  {
    text: "你想走演员路线，但公司死活让你继续做爱豆，你会？",
    options: [
      { text: "直接发解约函，老娘不干了", s: [3,0,0,2,4] },
      { text: "一边在团里混着，一边自己出去偷偷面试剧组", s: [1,1,1,1,2] },
      { text: "阳奉阴违，团综里装病，剧组里生龙活虎", s: [2,1,0,1,2] },
      { text: "算了，爱豆也挺赚钱的，听公司的吧", s: [0,1,0,0,1] }
    ]
  },
  {
    text: "作为爱豆，你最在乎的是？",
    options: [
      { text: "死忠粉多不多，能不能给我氪金打投", s: [0,3,2,1,1] },
      { text: "有没有拿得出手的『神级直拍』", s: [1,1,0,2,3] },
      { text: "自己开不开心，赚得够不够多", s: [1,0,1,0,3] },
      { text: "路人盘大不大，国民度高不高", s: [1,1,2,3,1] }
    ]
  },
  {
    text: "公司给你的part全是难听的垫音，好听的都给了别人，你？",
    options: [
      { text: "凭什么？这歌我不录了", s: [3,2,1,2,3] },
      { text: "好气，但在录音室还是得乖乖录完", s: [1,2,1,1,2] },
      { text: "去跟制作人软磨硬泡，求他给我加句词", s: [0,3,1,1,1] },
      { text: "躺平，不用唱C位还省得我跑调被骂", s: [0,1,0,0,2] }
    ]
  },
  {

const DIMS = ["冒险性","感性度","外向性","竞争心","自我认同"];

let cur = 0;
let ans = new Array(15).fill(null);

function startQuiz() {
  cur = 0; ans = new Array(15).fill(null);
  renderQ(); showScreen('quiz');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderQ() {
  const q = QUESTIONS[cur];
  const letters = ['A','B','C','D'];
  document.getElementById('qNum').textContent = 'Q ' + String(cur+1).padStart(2,'0');
  document.getElementById('qText').textContent = q.text;
  document.getElementById('progressText').textContent = (cur+1) + ' / 15';
  document.getElementById('progressFill').style.width = ((cur+1)/15*100) + '%';
  document.getElementById('btnBack').disabled = cur === 0;

  const wrap = document.getElementById('optionsWrap');
  wrap.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option' + (ans[cur] === i ? ' selected' : '');
    btn.innerHTML = '<span class="option-letter">'+letters[i]+'</span><span>'+opt.text+'</span>';
    btn.onclick = () => pick(i);
    wrap.appendChild(btn);
  });

  const nb = document.getElementById('btnNext');
  nb.textContent = cur === 14 ? '查看结果 →' : '下一题 →';
  nb.classList.toggle('ready', ans[cur] !== null);
}

function pick(i) {
  ans[cur] = i;
  document.querySelectorAll('.option').forEach((b,idx) => b.classList.toggle('selected', idx===i));
  document.getElementById('btnNext').classList.add('ready');
}

function goNext() {
  if (ans[cur] === null) return;
  if (cur < 14) { cur++; renderQ(); }
  else { calcResult(); }
}

function goBack() {
  if (cur > 0) { cur--; renderQ(); }
}

function calcResult() {
  showScreen('loading');
  const totals = [0,0,0,0,0];
  ans.forEach((a,qi) => {
    if(a!==null) QUESTIONS[qi].options[a].s.forEach((v,d) => { totals[d]+=v; });
  });

  setTimeout(() => {
    const DIM_MEANS = [14.75, 20.74, 12.49, 16.23, 30.26];
    const DIM_STDS  = [3.54,  3.07,  2.76,  3.07,  3.12];
    const MEMBER_Z  = [
      [-1.8,  1.5, -1.8, -0.8,  0.2],
      [ 1.8, -1.5, -0.5,  0.2,  1.8],
      [ 0.2, -1.2,  0.5, -2.0,  1.5],
      [ 0.8,  2.0,  0.5,  1.8, -2.0],
      [ 1.5,  0.2,  2.0, -1.0,  0.8],
      [-1.5,  0.5, -0.5,  0.5, -1.8],
      [ 0.2, -0.2,  1.5,  2.0, -1.2],
      [-0.8,  0.8,  1.0, -0.5,  1.8],
      [ 1.5, -1.5,  0.0,  1.5,  0.0],
    ];
    const userZ = totals.map((t,d) => (t - DIM_MEANS[d]) / DIM_STDS[d]);
    let best = 0, bestD = Infinity;
    MEMBER_Z.forEach((mz,i) => {
      const d = mz.reduce((s,z,di) => s + (userZ[di]-z)**2, 0);
      if (d < bestD) { bestD=d; best=i; }
    });
    showResult(best, totals);
  }, 1800);
}

function showResult(idx, totals) {
  const m = MEMBERS[idx];
  document.getElementById('rName').textContent = m.name;
  document.getElementById('rNameEn').textContent = m.en;
  document.getElementById('rTagline').textContent = '「' + m.tag + '」';
  document.getElementById('rReview').textContent = m.review;

  const sw = document.getElementById('rSimilar');
  sw.innerHTML = '';
  m.similar.forEach(s => {
    const p = document.createElement('span');
    p.className = 'similar-pill'; p.textContent = s; sw.appendChild(p);
  });

  const bw = document.getElementById('barsWrap');
  bw.innerHTML = '';
  const maxS = 15 * 3;
  totals.forEach((t,i) => {
    const pct = Math.round(t / maxS * 100);
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = '<span class="bar-label">'+DIMS[i]+'</span><div class="bar-track"><div class="bar-fill" id="bf'+i+'"></div></div><span class="bar-val">'+pct+'%</span>';
    bw.appendChild(row);
  });

  showScreen('result');

  requestAnimationFrame(() => {
    totals.forEach((t,i) => {
      const pct = Math.round(t / maxS * 100);
      setTimeout(() => { const b = document.getElementById('bf'+i); if(b) b.style.width = pct+'%'; }, i*120);
    });
  });
}

    this.textContent = '已复制 ✓';
    setTimeout(() => this.textContent = '复制分享文案', 2000);
  });
});
